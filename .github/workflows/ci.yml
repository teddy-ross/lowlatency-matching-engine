name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++-13, g++-14]
    steps:
      - uses: actions/checkout@v4
      - name: Ensure compiler
        run: which ${{ matrix.compiler }} || (sudo apt-get update && sudo apt-get install -y ${{ matrix.compiler }})
      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
